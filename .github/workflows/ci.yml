name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flake8
      - run: flake8 qgizmosql --count --show-source --statistics

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s tests/unit -v

  package:
    # Build a releasable plugin ZIP. Runs on every push/PR so we always know
    # the packaging is healthy; on tagged releases the artifact is attached
    # to the GitHub release.
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read plugin version
        id: meta
        run: |
          ver=$(awk -F= '/^version=/{print $2}' qgizmosql/metadata.txt)
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Install runtime deps into embedded_external_libs
        run: |
          mkdir -p qgizmosql/embedded_external_libs
          pip install --target qgizmosql/embedded_external_libs \
            adbc-driver-gizmosql pyarrow

      - name: Build plugin ZIP
        run: |
          zip -r "qgizmosql-${{ steps.meta.outputs.version }}.zip" qgizmosql \
            -x "qgizmosql/__pycache__/*" \
            -x "qgizmosql/**/__pycache__/*" \
            -x "qgizmosql/**/*.pyc"
          ls -lh qgizmosql-*.zip

      - uses: actions/upload-artifact@v4
        with:
          name: qgizmosql-plugin-zip
          path: qgizmosql-*.zip
          if-no-files-found: error

      - name: Attach ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: qgizmosql-*.zip
          generate_release_notes: true
