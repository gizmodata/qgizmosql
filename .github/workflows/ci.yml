name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flake8
      - run: flake8 qgizmosql --count --show-source --statistics

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s tests/unit -v

  package:
    # Build a releasable plugin ZIP. Runs on every push/PR so we always know
    # the packaging is healthy; on tagged releases the artifact is attached
    # to the GitHub release.
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve plugin version
        id: meta
        # On a v* tag push, use the tag (without the leading v) as the plugin
        # version and rewrite metadata.txt so the installed plugin reports it
        # correctly in the QGIS plugin manager. Off-tag builds keep whatever
        # metadata.txt already says (e.g. 0.1.0-DEV) — useful for testing
        # the packaging itself on PRs without bumping the source-of-truth.
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
            echo "Tagged release — syncing metadata.txt to version=${ver}"
            sed -i.bak -E "s/^version=.*/version=${ver}/" qgizmosql/metadata.txt
            rm -f qgizmosql/metadata.txt.bak
          else
            ver=$(awk -F= '/^version=/{print $2}' qgizmosql/metadata.txt)
          fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${ver}"

      - name: Install runtime deps into embedded_external_libs
        run: |
          mkdir -p qgizmosql/embedded_external_libs
          pip install --target qgizmosql/embedded_external_libs \
            adbc-driver-gizmosql pyarrow

      - name: Build plugin ZIP
        run: |
          zip -r "qgizmosql-${{ steps.meta.outputs.version }}.zip" qgizmosql \
            -x "qgizmosql/__pycache__/*" \
            -x "qgizmosql/**/__pycache__/*" \
            -x "qgizmosql/**/*.pyc"
          ls -lh qgizmosql-*.zip

      - uses: actions/upload-artifact@v4
        with:
          name: qgizmosql-plugin-zip
          path: qgizmosql-*.zip
          if-no-files-found: error

  release:
    # Publishes a GitHub Release with the ZIP attached on every v* tag.
    # Separate job (rather than a conditional step inside `package`) so the
    # release workflow is independently retryable from the Actions UI.
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: qgizmosql-plugin-zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: qgizmosql-*.zip
          name: qgizmosql ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
